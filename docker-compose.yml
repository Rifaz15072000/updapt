# ---- docker-compose.yml ----
# Orchestrates: nginx (reverse proxy), frontend, backend
# All containers are on the same Docker bridge network

version: '3.8'

services:

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"           # Only port exposed to the host / internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # Mount our custom config (read-only)
    depends_on:
      - frontend
      - backend
    restart: unless-stopped   # Auto-restart on failure / VM reboot
    networks:
      - app_network

  # ── Frontend Container ───────────────────────────────────────────────
  frontend:
    image: ${DOCKER_HUB_USERNAME}/cicd-frontend:${IMAGE_TAG:-latest}
    container_name: frontend_app
    expose:
      - "80"              # Only accessible inside Docker network (nginx proxies to it)
    restart: unless-stopped
    networks:
      - app_network

  # ── Backend Container ────────────────────────────────────────────────
  backend:
    image: ${DOCKER_HUB_USERNAME}/cicd-backend:${IMAGE_TAG:-latest}
    container_name: backend_app
    expose:
      - "5000"            # Only accessible inside Docker network
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Shared bridge network ────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
