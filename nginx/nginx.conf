# ---- nginx.conf ----
# Nginx reverse proxy configuration
# Routes:  /        → frontend container (port 3000)
#          /api/    → backend container  (port 5000)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Upstream definitions (Docker Compose service names act as DNS)
    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:5000;
    }

    server {
        listen 80;
        server_name _;          # Accept any hostname / IP

        # ── Frontend: serve everything at root ──────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Backend: route /api/* requests to the Express server ────────
        location /api/ {
            proxy_pass         http://backend/;   # trailing slash strips /api prefix
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check endpoint exposed directly ───────────────────────
        # CI/CD pipeline calls GET /api/health to verify deployment
        location /api/health {
            proxy_pass         http://backend/health;
            proxy_set_header   Host $host;
        }
    }
}
